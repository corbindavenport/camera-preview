<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        #camera-video {
            width: 100%;
            height: 100vh;
            z-index: 5;
            background: #000;
        }

        #camera-tools {
            background: rgba(250, 250, 252, 0.8);
            backdrop-filter: blur(14px);
            opacity: 0;
            visibility: hidden;
            transition-property: opacity, visibility;
            transition-duration: 0.5s;
            transition-delay: 1s;
        }

        body:hover #camera-tools {
            opacity: 1;
            visibility: visible;
            transition-delay: 0s;
        }

        @media (prefers-color-scheme: dark) {
            #camera-toolbar {
                background: rgba(22, 22, 23, 0.8);
            }
        }
    </style>
</head>

<body>

    <div class="container-fluid d-flex flex-column align-items-center justify-content-center" style="height: 100vh; z-index: 1;">
        <button type="button" class="btn btn-primary btn-lg shadow mb-3" id="start-camera-btn">Start camera</button>
        <div>
            This is <a href="https://github.com/corbindavenport/camera-preview" target="_blank">open-source on GitHub</a>
        </div>
    </div>

    <video id="camera-video" muted autoplay playsinline disablepictureinpicture controlsList="nodownload,noremoteplayback" class="d-none fixed-top"></video>

    <div class="container fixed-bottom mb-3" style="z-index: 10;">
        <div id="camera-tools" class="card shadow p-2">
            <div class="row">
                <div id="camera-info" class="col-4 d-flex flex-column justify-content-center text-center">
                    <!-- Todo -->
                </div>
                <div class="col-4">
                    <select class="form-select w-100" aria-label="Select camera" id="camera-select">
                        <option selected disabled>Select camera...</option>
                    </select>
                </div>
                <div class="col-4 text-center">
                    <button id="fullscreen-btn" type="button" class="btn btn-light">
                        <i class="bi bi-arrows-fullscreen me-2"></i>
                        Fullscreen
                    </button>
                </div>
            </div>
        </div>
    </div>

    </div>

    <script src="js/main.js"></script>

</body>

</html>
