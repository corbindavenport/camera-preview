<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Preview</title>
    <meta name="description" content="Show a preview of your camera or capture card.">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/site.webmanifest">
    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="192x192" href="/img/maskable_icon_x192.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/img/icon48.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/icon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/icon16.png">
    <link rel="shortcut icon" href="favicon.ico">
    <!-- Theme colors -->
    <meta name="color-scheme" content="dark light">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#343a40">
    <meta name="theme-color" content="#e9ecef">
    <!-- Bootstrap and custom styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/js/dark.js"></script>
    <link rel="stylesheet" href="custom.css">
</head>

<body>

    <!-- Top navigation -->
    <nav id="main-nav" class="navbar navbar-expand-lg fixed-top bg-glass border-bottom">
        <div class="container-fluid">
            <div class="row w-100 m-0 p-0">
                <div class="col-4 d-flex flex-column justify-content-center">
                    <span class="navbar-brand">Camera Preview</span>
                </div>
                <div class="col-4">
                    <select class="form-select w-100" aria-label="Select camera" id="camera-select">
                        <option selected disabled>Select camera...</option>
                    </select>
                </div>
                <!-- Fullscreen button -->
                <div class="col-2 text-center">
                    <button id="fullscreen-btn" type="button" class="btn btn-secondary w-100">
                        <i class="bi bi-arrows-fullscreen"></i>
                        <span class="d-none d-lg-inline-block ms-2">
                            Fullscreen
                        </span>
                    </button>
                </div>
                <!-- New window button -->
                <div class="col-2 text-center">
                    <button id="new-window-btn" type="button" class="btn btn-secondary w-100">
                        <i class="bi bi-plus-circle-fill"></i>
                        <span class="d-none d-lg-inline-block ms-2">
                            New view
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="splash-container" class="container-fluid d-flex flex-column align-items-center justify-content-center">
        <div id="camera-permission-alert" class="alert alert-warning d-none" role="alert">
            Please allow the Camera permission in your web browser to see the camera feed. 
        </div>
        <p>This is <a href="https://github.com/corbindavenport/camera-preview" target="_blank">open-source on GitHub</a>.</p>
    </div>

    <video id="camera-video" muted autoplay playsinline disablepictureinpicture controlsList="nodownload,noremoteplayback" class="d-none fixed-top"></video>

    <script src="js/main.js"></script>

</body>

</html>
